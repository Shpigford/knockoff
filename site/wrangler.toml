name = "knockoff-site"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = false

# routes must sit above any [table] section or TOML scopes them into it
routes = [
  { pattern = "knockoff.shopping", custom_domain = true },
  { pattern = "www.knockoff.shopping", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
